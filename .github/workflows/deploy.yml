# Добавить workflow вручную

1. Открой: **https://github.com/ecofreeon/openai-qwen/new/master?filename=.github/workflows/deploy.yml**

2. Вставь этот код:

```yaml
name: Deploy to Cloudflare Workers
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install wrangler --save-dev
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
```

3. Нажми **Commit new file**

4. Открой **Actions** → **Deploy to Cloudflare Workers** → **Run workflow**
